<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Daily Sheet Control</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .sheet-scroll { overflow-x: auto; }
    .sheet-table { min-width: 600px; }
    .sheet-table td select.aktivitas-sel {
      width: 100%; border: none; outline: none; font-size: 11px;
      background: transparent; cursor: pointer; padding: 2px;
      color: #c0392b; font-weight: 600;
    }
    .sheet-table td select.aktivitas-sel option { color: #c0392b; font-weight: 600; }
    .sheet-table td select.aktivitas-sel option[value=""] { color: #999; font-weight: 400; }
  </style>
</head>
<body>
  <div class="page-header">
    <button class="btn-back" onclick="goBack()">←</button>
    <h1>Daily Sheet Control</h1>
  </div>

  <div class="form-container">
    <form id="daily-sheet-form">
      <div class="form-section">
        <div class="form-row">
          <div class="form-group">
            <label>Tanggal</label>
            <input type="date" name="tanggal">
          </div>
          <div class="form-group">
            <label>Shift</label>
            <select name="shift">
              <option value="">Pilih</option>
              <option>Pagi (06:00-18:00)</option>
              <option>Malam (18:00-06:00)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Hole No</label>
            <input type="text" name="hole_no" placeholder="Hole No">
          </div>
          <div class="form-group">
            <label>Driller</label>
            <input type="text" name="driller" placeholder="Nama Driller">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Lokasi</label>
            <input type="text" name="lokasi" placeholder="Lokasi">
          </div>
          <div class="form-group">
            <label>Mesin</label>
            <input type="text" name="mesin" placeholder="No Mesin">
          </div>
        </div>
      </div>

      <!-- Tabel Aktivitas -->
      <div class="form-section">
        <div class="form-section-title">Aktivitas Harian</div>
        <div class="sheet-scroll">
          <table class="sheet-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Waktu Mulai</th>
                <th>Waktu Selesai</th>
                <th>Aktivitas</th>
                <th>Dari (m)</th>
                <th>Ke (m)</th>
                <th>Ket</th>
              </tr>
            </thead>
            <tbody id="activity-body"></tbody>
          </table>
        </div>
        <button type="button" onclick="addRow()" style="margin-top:10px;background:var(--teal);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;">
          + Tambah Baris
        </button>
      </div>

      <!-- Summary -->
      <div class="form-section">
        <div class="form-section-title">Ringkasan</div>
        <div class="form-row">
          <div class="form-group">
            <label>Total Kedalaman (m)</label>
            <input type="number" name="total_kedalaman" placeholder="0">
          </div>
          <div class="form-group">
            <label>Total Jam Kerja</label>
            <input type="number" name="total_jam" placeholder="0">
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group">
            <label>Catatan</label>
            <textarea name="catatan" placeholder="Catatan harian..."></textarea>
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="action-bar">
    <button class="btn btn-save" onclick="saveData()">💾 Save</button>
    <button class="btn btn-clear" onclick="clearData()">✕ Clear</button>
    <button class="btn btn-submit" onclick="submitData()">✓ Submit</button>
  </div>

  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/app.js"></script>
  <script src="js/drive.js"></script>
  <script>
    const AKTIVITAS_LIST = [
      'Travel',
      'Safety Talk',
      'Waiting Transportation',
      'Engine Check',
      'Fueling',
      'Drilling',
      'Water Problem',
      'Waiting Corebox',
      'Pull out Rod',
      'Waiting Dozer',
      'Moving & Setting',
      'Resting',
      'Technical Problem',
      'Mechanical Problem',
      'Wait Supv',
      'Permit',
      'Weather Condition',
      'Day Off',
      'Mobilization',
      'Reporting',
    ];

    const AKTIVITAS_OPTS = AKTIVITAS_LIST.map(a =>
      `<option value="${a}">${a}</option>`
    ).join('');

    let rowCount = 0;

    function addRow() {
      rowCount++;
      const tbody = document.getElementById('activity-body');
      const tr = document.createElement('tr');
      tr.id = `row-${rowCount}`;
      tr.innerHTML = `
        <td style="text-align:center;font-size:11px;color:#999;">${rowCount}</td>
        <td><input type="time" name="waktu_mulai_${rowCount}"></td>
        <td><input type="time" name="waktu_selesai_${rowCount}"></td>
        <td>
          <select name="aktivitas_${rowCount}" class="aktivitas-sel">
            <option value="">— Pilih Aktivitas —</option>
            ${AKTIVITAS_OPTS}
          </select>
        </td>
        <td><input type="number" name="dari_${rowCount}" placeholder="0"></td>
        <td><input type="number" name="ke_${rowCount}" placeholder="0"></td>
        <td><input type="text" name="ket_${rowCount}" placeholder="-"></td>
      `;
      tbody.appendChild(tr);
    }

    function saveData() {
      const data = getFormData('daily-sheet-form');
      data.row_count = rowCount;
      DB.save('daily_sheet', data);
      showToast('Daily Sheet tersimpan!');
    }

    function clearData() {
      clearForm('daily-sheet-form');
      document.getElementById('activity-body').innerHTML = '';
      rowCount = 0;
      showToast('Form dikosongkan');
    }

    async function uploadData() {
      const data = getFormData('daily-sheet-form');
      data.row_count = rowCount;
      DB.save('daily_sheet', data);
      const json = JSON.stringify(DB.getAll('daily_sheet'), null, 2);
      await uploadToDrive(`daily_sheet_${new Date().toISOString().slice(0,10)}.json`, json);
    }

    function submitData() {
      const data = getFormData('daily-sheet-form');
      data.row_count = rowCount;
      DB.save('daily_sheet', data);

      const tgl  = data.tanggal || new Date().toISOString().slice(0,10);
      const hole = (data.hole_no || 'unknown').replace(/\s+/g,'_');
      const filename = `DailySheet_${hole}_${tgl}.xls`;

      // Build XLS
      const headers = ['No','Waktu Mulai','Waktu Selesai','Aktivitas','Dari (m)','Ke (m)','Ket'];
      let rows = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
      for (let i = 1; i <= rowCount; i++) {
        rows += '<tr>';
        rows += `<td>${i}</td>`;
        rows += `<td>${data['waktu_mulai_'+i]||''}</td>`;
        rows += `<td>${data['waktu_selesai_'+i]||''}</td>`;
        rows += `<td>${data['aktivitas_'+i]||''}</td>`;
        rows += `<td>${data['dari_'+i]||''}</td>`;
        rows += `<td>${data['ke_'+i]||''}</td>`;
        rows += `<td>${data['ket_'+i]||''}</td>`;
        rows += '</tr>';
      }

      const info = `<tr><td colspan="7"><b>Tanggal:</b> ${data.tanggal||''} | <b>Shift:</b> ${data.shift||''} | <b>Hole No:</b> ${data.hole_no||''} | <b>Driller:</b> ${data.driller||''} | <b>Lokasi:</b> ${data.lokasi||''} | <b>Mesin:</b> ${data.mesin||''}</td></tr><tr><td colspan="7"></td></tr>`;

      const html = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><table>${info}${rows}</table></body></html>`;
      const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      showToast('✓ ' + filename + ' berhasil didownload!');
    }

    // Default 3 baris
    addRow(); addRow(); addRow();
  </script>
</body>
</html>
